<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表單範例</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }
        .tabs {
            display: flex;
            background: #f8f9fa;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            color: #666;
            border: none;
            background: transparent;
            font-size: 14px;
        }
        .tab:hover {
            background: #e9ecef;
        }
        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        .form-section {
            padding: 30px;
            display: none;
        }
        .form-section.active {
            display: block;
        }
        h2 {
            color: #333;
            margin-bottom: 25px;
            text-align: center;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        input[type="date"],
        input[type="number"],
        input[type="url"],
        textarea,
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            background: #fafafa;
        }
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .radio-group,
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .radio-group label,
        .checkbox-group label {
            display: flex;
            align-items: center;
            font-weight: normal;
            cursor: pointer;
        }
        .radio-group input,
        .checkbox-group input {
            width: auto;
            margin-right: 10px;
            transform: scale(1.2);
            cursor: pointer;
        }
        .range-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type="range"] {
            flex: 1;
            height: 8px;
            border-radius: 5px;
            background: #e1e1e1;
            appearance: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.4);
        }
        .range-value {
            min-width: 40px;
            text-align: center;
            font-weight: 600;
            color: #667eea;
        }
        .color-input {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type="color"] {
            width: 50px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .file-input {
            border: 2px dashed #ccc;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            background: #fafafa;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-input:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .file-input input {
            display: none;
        }
        .file-input-label {
            color: #666;
            font-size: 13px;
        }
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn-group .btn {
            flex: 1;
        }
        .inline-group {
            display: flex;
            gap: 10px;
        }
        .inline-group .form-group {
            flex: 1;
        }
        .error {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
        }
        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        @media (max-width: 480px) {
            .container {
                border-radius: 15px;
            }
            .form-section {
                padding: 20px;
            }
            .inline-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="showSection('login')">登入</button>
            <button class="tab" onclick="showSection('register')">註冊</button>
            <button class="tab" onclick="showSection('survey')">問卷調查</button>
        </div>
        <div id="login" class="form-section active">
            <h2>登入表單</h2>
            <form onsubmit="handleSubmit(event, '登入成功！')">
                <div class="form-group">
                    <label for="login-email">電子郵件</label>
                    <input type="email" id="login-email" name="email" placeholder="請輸入電子郵件" required>
                </div>
                <div class="form-group">
                    <label for="login-password">密碼</label>
                    <input type="password" id="login-password" name="password" placeholder="請輸入密碼" required minlength="6">
                </div>
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">記住我</label>
                </div>
                <button type="submit" class="btn btn-primary">登入</button>
            </form>
        </div>
        <div id="register" class="form-section">
            <h2>註冊表單</h2>
            <form onsubmit="handleSubmit(event, '註冊成功！')">
                <div class="form-group">
                    <label for="reg-username">使用者名稱</label>
                    <input type="text" id="reg-username" name="username" placeholder="請輸入使用者名稱" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">電子郵件</label>
                    <input type="email" id="reg-email" name="email" placeholder="請輸入電子郵件" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">密碼</label>
                    <input type="password" id="reg-password" name="password" placeholder="請輸入密碼（至少8個字元）" required minlength="8">
                </div>
                <div class="form-group">
                    <label for="reg-confirm-password">確認密碼</label>
                    <input type="password" id="reg-confirm-password" name="confirm-password" placeholder="請再次輸入密碼" required>
                </div>
                <div class="inline-group">
                    <div class="form-group">
                        <label for="reg-firstname">名字</label>
                        <input type="text" id="reg-firstname" name="firstname" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-lastname">姓氏</label>
                        <input type="text" id="reg-lastname" name="lastname" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-phone">電話號碼</label>
                    <input type="tel" id="reg-phone" name="phone" placeholder="0912-345-678" pattern="[0-9]{4}-[0-9]{3}-[0-9]{3}">
                </div>
                <div class="form-group">
                    <label for="reg-birthdate">出生日期</label>
                    <input type="date" id="reg-birthdate" name="birthdate">
                </div>
                <div class="form-group">
                    <label for="reg-gender">性別</label>
                    <select id="reg-gender" name="gender">
                        <option value="">請選擇性別</option>
                        <option value="male">男性</option>
                        <option value="female">女性</option>
                        <option value="other">其他</option>
                        <option value="prefer-not">不希望透漏</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>興趣愛好</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="hobbies" value="reading"> 閱讀</label>
                        <label><input type="checkbox" name="hobbies" value="sports"> 運動</label>
                        <label><input type="checkbox" name="hobbies" value="music"> 音樂</label>
                        <label><input type="checkbox" name="hobbies" value="travel"> 旅遊</label>
                        <label><input type="checkbox" name="hobbies" value="cooking"> 烹飪</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-website">個人網站</label>
                    <input type="url" id="reg-website" name="website" placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label for="reg-avatar">大頭貼</label>
                    <div class="file-input" onclick="document.getElementById('avatar').click()">
                        <input type="file" id="avatar" name="avatar" accept="image/*">
                        <div class="file-input-label">點擊上傳圖片</div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-bio">個人簡介</label>
                    <textarea id="reg-bio" name="bio" placeholder="簡單介紹一下自己..."></textarea>
                </div>
                <div class="form-group">
                    <label for="reg-favorite-color">最喜歡的顏色</label>
                    <div class="color-input">
                        <input type="color" id="reg-favorite-color" name="favorite-color" value="#667eea">
                        <span id="color-value">#667eea</span>
                    </div>
                </div>
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="agree-terms" name="agree-terms" required>
                    <label for="agree-terms">我已閱讀並同意 <a href="#">服務條款</a> 和 <a href="#">隱私政策</a></label>
                </div>
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="subscribe" name="subscribe">
                    <label for="subscribe">訂閱電子報</label>
                </div>
                <button type="submit" class="btn btn-primary">註冊</button>
            </form>
        </div>
        <div id="survey" class="form-section">
            <h2>問卷調查</h2>
            <div class="success-message" id="survey-success">問卷已提交，感謝您的回覆！</div>
            <form onsubmit="handleSurveySubmit(event)">
                <div class="form-group">
                    <label for="survey-name">姓名</label>
                    <input type="text" id="survey-name" name="name" placeholder="請輸入您的姓名" required>
                </div>
                <div class="form-group">
                    <label for="survey-email">電子郵件</label>
                    <input type="email" id="survey-email" name="email" placeholder="請輸入您的電子郵件" required>
                </div>
                <div class="form-group">
                    <label for="survey-age">年齡</label>
                    <input type="number" id="survey-age" name="age" min="1" max="120" placeholder="請輸入年齡">
                </div>
                <div class="form-group">
                    <label>您是如何知道這個網站的？</label>
                    <div class="radio-group">
                        <label><input type="radio" name="source" value="search" required> 搜尋引擎</label>
                        <label><input type="radio" name="source" value="friend"> 朋友推薦</label>
                        <label><input type="radio" name="source" value="social"> 社群媒體</label>
                        <label><input type="radio" name="source" value="ad"> 廣告</label>
                        <label><input type="radio" name="source" value="other"> 其他</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="survey-frequency">您多久造訪一次？</label>
                    <select id="survey-frequency" name="frequency" required>
                        <option value="">請選擇</option>
                        <option value="daily">每天</option>
                        <option value="weekly">每週</option>
                        <option value="monthly">每月</option>
                        <option value="rarely">很少</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="satisfaction">滿意度（1-10）</label>
                    <div class="range-container">
                        <input type="range" id="satisfaction" name="satisfaction" min="1" max="10" value="5" oninput="updateRangeValue(this)">
                        <span class="range-value" id="satisfaction-value">5</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="recommend">您會推薦給朋友嗎？（0-100%）</label>
                    <div class="range-container">
                        <input type="range" id="recommend" name="recommend" min="0" max="100" value="50" oninput="updateRangeValue(this)">
                        <span class="range-value" id="recommend-value">50%</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>您使用過哪些功能？（可複選）</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="features" value="login"> 登入功能</label>
                        <label><input type="checkbox" name="features" value="search"> 搜尋功能</label>
                        <label><input type="checkbox" name="features" value="cart"> 購物車</label>
                        <label><input type="checkbox" name="features" value="payment"> 付款功能</label>
                        <label><input type="checkbox" name="features" value="profile"> 個人資料</label>
                        <label><input type="checkbox" name="features" value="support"> 客服支援</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="improvement">您希望改進的地方？</label>
                    <textarea id="improvement" name="improvement" placeholder="請告訴我們您的建議..."></textarea>
                </div>
                <div class="form-group">
                    <label for="feedback">整体評價</label>
                    <textarea id="feedback" name="feedback" placeholder="請分享您的使用心得..."></textarea>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">提交問卷</button>
                    <button type="reset" class="btn btn-secondary">重置</button>
                </div>
            </form>
        </div>
    </div>
    <script>
        function showSection(sectionId) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(section => section.classList.remove('active'));
            
            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');
        }
        function handleSubmit(event, message) {
            event.preventDefault();
            alert(message);
        }
        function handleSurveySubmit(event) {
            event.preventDefault();
            document.getElementById('survey-success').style.display = 'block';
            setTimeout(() => {
                document.getElementById('survey-success').style.display = 'none';
                event.target.reset();
            }, 3000);
        }
        function updateRangeValue(input) {
            const valueSpan = document.getElementById(input.id + '-value');
            if (input.id === 'recommend') {
                valueSpan.textContent = input.value + '%';
            } else {
                valueSpan.textContent = input.value;
            }
        }
        document.getElementById('reg-favorite-color').addEventListener('input', function() {
            document.getElementById('color-value').textContent = this.value;
        });
        document.getElementById('avatar').addEventListener('change', function() {
            const label = this.parentElement.querySelector('.file-input-label');
            if (this.files.length > 0) {
                label.textContent = '已選擇: ' + this.files[0].name;
                label.style.color = '#667eea';
            } else {
                label.textContent = '點擊上傳圖片';
                label.style.color = '#666';
            }
        });
    </script>
</body>
</html>
